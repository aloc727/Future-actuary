<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
(function () {
  var el = document.getElementById("paper");

  function slug(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  }

  function typesetWhenReady(node) {
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([node]).catch(function () {});
    } else {
      setTimeout(function () { typesetWhenReady(node); }, 120);
    }
  }

  fetch("docs/ACTUARIAL_AI_EXPLAINABILITY.md")
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function (raw) {
      // Protect LaTeX math from Markdown's emphasis/escaping, then restore
      // it verbatim so MathJax sees clean TeX.
      // Protect ONLY $$…$$ display blocks from Markdown. Single $ (dollar
      // amounts) are left alone — MathJax no longer treats $ as a delimiter.
      var math = [];
      var src = raw
        .replace(/\$\$[\s\S]*?\$\$/g, function (m) { math.push(m); return "@@MATH" + (math.length - 1) + "@@"; });

      marked.setOptions({ gfm: true, breaks: false });
      var html = marked.parse(src);
      html = html.replace(/@@MATH(\d+)@@/g, function (_, i) { return math[+i]; });
      el.innerHTML = html;

      // Anchor ids + table of contents from h2s.
      var toc = document.getElementById("toc");
      var heads = el.querySelectorAll("h2, h3");
      var tocHtml = "";
      heads.forEach(function (h) {
        var id = slug(h.textContent);
        h.id = id;
        if (h.tagName === "H2") {
          tocHtml += '<a href="#' + id + '">' + h.textContent.replace(/^\d+\.\s*/, "") + "</a>";
        }
      });
      // Friendly aliases used by inbound links from other pages.
      var aliasMap = { why: "why-actuarial-why-now", mappings: "the-method-mappings-the-intellectual-heart", worked: "worked-example-a-humana-style-prior-authorization-ai" };
      Object.keys(aliasMap).forEach(function (a) {
        var target = document.getElementById(aliasMap[a]);
        if (target && !document.getElementById(a)) {
          var anchor = document.createElement("span");
          anchor.id = a;
          target.parentNode.insertBefore(anchor, target);
        }
      });
      if (toc) toc.innerHTML = tocHtml;

      typesetWhenReady(el);

      // jump to hash after render
      if (location.hash) {
        var t = document.getElementById(location.hash.slice(1));
        if (t) t.scrollIntoView();
      }
    })
    .catch(function (e) {
      el.innerHTML = '<div class="alert alert-warning">Could not load the rendered paper (' +
        e.message + '). This page renders the Markdown source over HTTP — open it via a ' +
        'static server, or read the source directly: <a href="docs/ACTUARIAL_AI_EXPLAINABILITY.md">' +
        'docs/ACTUARIAL_AI_EXPLAINABILITY.md</a>.</div>';
    });
})();
</script>
