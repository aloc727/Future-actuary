name: Deploy to GitHub Pages

# Publishes the static site (repo root) to GitHub Pages on every push to main.
# `actions/configure-pages` with `enablement: true` turns Pages on and sets the
# source to "GitHub Actions" automatically on the first run, so no manual
# Settings -> Pages step is required.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy job needs to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site (index.html, paper.html, tool.html,
          # css/, js/, docs/). No build step.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
